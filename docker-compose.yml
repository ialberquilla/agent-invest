services:
  agent:
    build:
      context: .
      dockerfile: agent/docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_invest
      HOST: 0.0.0.0
      PORT: 8000
      UV_CACHE_DIR: /app/.data/uv
      XDG_CACHE_HOME: /app/.data/xdg-cache
    ports:
      - "${AGENT_PORT:-8000}:8000"
    volumes:
      - ${HOME}/.opencode:/root/.opencode
      - ${HOME}/.config/opencode:/root/.config/opencode
      - ${HOME}/.local/share/opencode:/root/.local/share/opencode
      - ${HOME}/.aws:/root/.aws
      - ./.data:/app/.data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agent_invest
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_invest"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
